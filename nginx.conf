server {
    listen 80;
    server_name _;          # replace _ with your domain or IP if you have one

    root /var/www/ausspend; # path where you copy the dist/ folder
    index index.html;

    # Serve the React app — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # When your Flask API is running, proxy /api/* to it
    # Uncomment this block once the backend is ready:
    #
    # location /api/ {
    #     proxy_pass http://127.0.0.1:5000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # Cache static assets aggressively (JS/CSS have hashed filenames from Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
